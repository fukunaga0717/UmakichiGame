<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#141110">
<title>馬刺仕分け | ウマキチ都立家政店</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

  <!-- スタート画面 -->
  <section id="screen-start" class="screen active">
    <div class="start-header">
      <span class="badge-tag">酔っ払い注意</span>
      <h1 class="izaka-title">馬刺仕分け<small>ウマキチ都立家政店</small></h1>
    </div>
    <p class="start-sub">中央に出てくる肉カードを、正しいお皿めがけて指でフリック！<br>間違えるとペナルティ演出…店長は食べちゃダメだぞ🧑‍🍳</p>

    <div class="level-select">
      <button type="button" class="level-btn active" data-level="1">
        <span class="level-num">Lv.1</span>
        <span class="level-name">30秒タイムアタック</span>
      </button>
      <button type="button" class="level-btn" data-level="2">
        <span class="level-num">Lv.2</span>
        <span class="level-name">対象外まじり</span>
      </button>
      <button type="button" class="level-btn" data-level="3" disabled>
        <span class="level-num">Lv.3</span>
        <span class="level-name">準備中…</span>
      </button>
    </div>

    <button type="button" id="start-btn" class="btn btn-primary">ゲーム開始</button>
  </section>

  <!-- カウントダウン -->
  <section id="screen-countdown" class="screen">
    <div id="countdown-num">3</div>
  </section>

  <!-- ゲーム画面 -->
  <section id="screen-game" class="screen">
    <div id="hud">
      <div id="hud-timer-wrap"><div id="hud-timer">30</div></div>
    </div>
    <button type="button" id="btn-game-home" aria-label="トップに戻る">TOP</button>
    <div id="hud-score">SCORE 0</div>

    <div id="game-area">
      <!-- 皿は JS が動的に生成 -->
      <div id="card-layer">
        <div id="meat-card" class="meat-card"></div>
      </div>
      <div id="correct-overlay">○</div>
      <div id="flash-overlay"></div>
      <div id="gameover-overlay">
        <div class="gameover-box">
          <div class="big" id="gameover-big">それ人間！！</div>
          <div class="small" id="gameover-small">店長は仕入れ先じゃありません</div>
          <div class="answer" id="gameover-answer"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- 結果画面 -->
  <section id="screen-result" class="screen">
    <div class="result-panel">
      <div class="label">RESULT</div>
      <div class="score" id="result-score">0</div>
      <div class="miss-count" id="result-miss"></div>
      <div class="taunt" id="result-taunt"></div>
    </div>

    <div class="trivia-panel">
      <div class="trivia-label">📖 本日の豆知識</div>
      <div class="trivia-text" id="result-trivia"></div>
      <div class="trivia-hook">気になったらそのまま追加注文！</div>
    </div>

    <div class="learn-panel">
      <div class="trivia-label">🐴 部位をタップして学ぶ</div>
      <div class="learn-lead" id="learn-lead">画像の部位、または下のボタンをタップすると、写真と見分け方が表示されます。</div>
      <div class="learn-map-wrap">
        <img id="learn-map" src="images/hoursePartsMap.png" alt="馬肉の部位図">
        <button type="button" class="learn-hotspot learn-hotspot-akami-front" data-learn-key="akami" aria-label="赤身"></button>
        <button type="button" class="learn-hotspot learn-hotspot-akami-back" data-learn-key="akami" aria-label="赤身"></button>
        <button type="button" class="learn-hotspot learn-hotspot-tategami" data-learn-key="tategami" aria-label="タテガミ"></button>
        <button type="button" class="learn-hotspot learn-hotspot-futagoe" data-learn-key="futagoe" aria-label="フタエゴ"></button>
        <button type="button" class="learn-hotspot learn-hotspot-hatsu" data-learn-key="hatsu" aria-label="ハツ"></button>
        <button type="button" class="learn-hotspot learn-hotspot-tan" data-learn-key="tan" aria-label="タン"></button>
        <button type="button" class="learn-hotspot learn-hotspot-karubi" data-learn-key="karubi" aria-label="カルビ"></button>
        <button type="button" class="learn-hotspot learn-hotspot-reba" data-learn-key="reba" aria-label="レバー"></button>
        <button type="button" class="learn-hotspot learn-hotspot-shimofuri" data-learn-key="shimofuri" aria-label="霜降り"></button>
      </div>
      <div id="learn-buttons" class="learn-buttons"></div>
      <div class="learn-detail">
        <img id="learn-image" alt="">
        <div>
          <div id="learn-title"></div>
          <div id="learn-trivia"></div>
          <div id="learn-tip"></div>
        </div>
      </div>
    </div>

    <div class="result-actions">
      <button type="button" id="btn-retry" class="btn btn-gold">もう一回挑戦する</button>
      <button type="button" id="btn-staff" class="btn btn-primary">結果を店員に見せて特典をもらう！</button>
      <div class="share-row">
        <button type="button" id="btn-share-x" class="btn btn-gold">Xでシェア</button>
        <button type="button" id="btn-share-line" class="btn btn-gold">LINEでシェア</button>
      </div>
      <button type="button" id="btn-result-home" class="btn btn-ghost">トップに戻る</button>
    </div>
  </section>

  <!-- 店員確認画面 -->
  <section id="screen-staff" class="screen">
    <div class="staff-panel">
      <h2>スタッフ確認画面</h2>
      <div class="staff-score" id="staff-score">0点</div>
      <div class="staff-timer-label">この画面の有効期限</div>
      <div class="staff-timer" id="staff-timer">05:00</div>
      <button type="button" id="btn-staff-confirm" class="btn btn-primary">スタッフ確認ボタン</button>
      <div class="staff-confirmed-badge" id="staff-confirmed-badge">確認済み✓</div>
    </div>
    <button type="button" id="btn-staff-home" class="btn btn-ghost">トップに戻る</button>
  </section>

</div>

<div id="rotate-overlay">📱<br>スマホを縦向きにしてください</div>

<script src="js/data.js"></script>
<script>
(function(){
"use strict";

/* ---------------- 状態 ---------------- */
var state = {
  selectedLevelId: 1,
  level: LEVELS[0],
  round: null, // ゲーム開始時に buildRoundData() で生成(お皿の割当と出題プール)
  score: 0,
  currentCard: null,
  lastKey: null,
  lastKey2: null,
  dragging: false,
  locked: false, // アニメ中の操作ロック
  startX:0, startY:0, curX:0, curY:0, dragStartTime:0,
  timerRafId: null,
  gameStartTs: 0,
  missCount: 0,
  humanMissCount: 0,
  missedKeys: [],
  staffIntervalId: null,
  audioCtx: null,
  countingDown: false
};

/* ---------------- 画面切替 ---------------- */
var screens = {};
["start","countdown","game","result","staff"].forEach(function(name){
  screens[name] = document.getElementById("screen-"+name);
});
function showScreen(name){
  Object.keys(screens).forEach(function(k){
    screens[k].classList.toggle("active", k===name);
  });
}

/* ---------------- 音・振動 ---------------- */
function unlockAudio(){
  if(!state.audioCtx){
    try{
      var AC = window.AudioContext || window.webkitAudioContext;
      state.audioCtx = new AC();
    }catch(e){ state.audioCtx = null; }
  }

  if(state.audioCtx && state.audioCtx.state === "suspended" && state.audioCtx.resume){
    state.audioCtx.resume();
  }
}
function beep(freq, dur, type){
  if(!state.audioCtx) return;
  try{
    var ctx = state.audioCtx;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = type || "square";
    osc.frequency.value = freq;
    gain.gain.value = 0.06;
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    osc.stop(ctx.currentTime + dur);
  }catch(e){}
}
function vibrate(pattern){
  if(navigator.vibrate){ navigator.vibrate(pattern); }
}

/* ---------------- ビジュアル生成(絵文字/画像フォールバック) ---------------- */
function buildVisual(key){
  var asset = ASSETS[key] || { emoji:"？", img:null };
  var wrap = document.createElement("div");
  wrap.className = "visual";

  function appendEmoji(){
    var emoji = document.createElement("div");
    emoji.className = "visual-emoji";
    emoji.textContent = asset.emoji;
    wrap.appendChild(emoji);
  }

  if(asset.img){
    var img = document.createElement("img");
    img.className = "visual-img";
    img.alt = "";
    img.draggable = false;
    img.addEventListener("error", function(){
      wrap.innerHTML = "";
      appendEmoji();
    });
    img.src = asset.img;
    wrap.appendChild(img);
  } else {
    appendEmoji();
  }

  return wrap;
}

/* ---------------- レベル選択(スタート画面) ---------------- */
var levelButtons = document.querySelectorAll(".level-btn");
levelButtons.forEach(function(btn){
  btn.addEventListener("click", function(){
    if(btn.disabled) return;
    levelButtons.forEach(function(b){ b.classList.remove("active"); });
    btn.classList.add("active");
    state.selectedLevelId = parseInt(btn.dataset.level, 10);
  });
});

document.getElementById("start-btn").addEventListener("click", function(){
  unlockAudio();
  beep(660,0.08,"triangle");
  goCountdown();
});

/* ---------------- カウントダウン ---------------- */
function goCountdown(){
  if(state.countingDown) return;
  state.countingDown = true;
  showScreen("countdown");
  var n = 3;
  var el = document.getElementById("countdown-num");
  el.classList.remove("start-text");
  el.textContent = n;
  el.style.animation = "none"; void el.offsetWidth; el.style.animation = "";
  beep(440,0.12,"square");
  var timer = setInterval(function(){
    n--;
    if(n > 0){
      el.classList.remove("start-text");
      el.textContent = n;
      el.style.animation = "none"; void el.offsetWidth; el.style.animation = "";
      beep(440,0.12,"square");
    } else if(n === 0){
      el.classList.add("start-text");
      el.textContent = "スタート！";
      el.style.animation = "none"; void el.offsetWidth; el.style.animation = "";
      beep(880,0.2,"triangle");
    } else {
      clearInterval(timer);
      state.countingDown = false;
      startGame();
    }
  }, 700);
}

/* ---------------- ゲーム本体 ---------------- */
var gameArea = document.getElementById("game-area");
var cardLayer = document.getElementById("card-layer");
var meatCard = document.getElementById("meat-card");
var hudTimer = document.getElementById("hud-timer");
var hudScore = document.getElementById("hud-score");
var correctOverlay = document.getElementById("correct-overlay");
var flashOverlay = document.getElementById("flash-overlay");
var gameoverOverlay = document.getElementById("gameover-overlay");

function shuffleArray(arr){
  for(var i = arr.length - 1; i > 0; i--){
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

// レベル定義から「今回のラウンド」の皿割当と出題プールを組み立てる
// (レベル2はゲーム開始のたびに実在部位3つ・お皿の位置をシャッフルする)
function buildRoundData(level){
  if(level.id === 1){
    return { targets: level.targets, weightedKeys: level.weightedKeys };
  }

  var corners = shuffleArray(["TL","TR","BL"]);
  var chosenCuts = shuffleArray(level.cutPool.slice()).slice(0, 3);
  var dummyCuts = level.cutPool.filter(function(key){ return chosenCuts.indexOf(key) === -1; });
  var targets = chosenCuts.map(function(key, i){
    return { key:key, label:LABELS[key], corner:corners[i], trap:false };
  });
  targets.push({ key:level.bossKey, label:LABELS[level.bossKey], corner:"BR", trap:true });

  var weightedKeys = [];
  chosenCuts.forEach(function(key){
    weightedKeys.push(key, key, key);
  });
  weightedKeys.push(level.bossKey);
  shuffleArray(dummyCuts.slice()).forEach(function(key){ weightedKeys.push(key); });

  return { targets: targets, weightedKeys: weightedKeys };
}

function buildPlates(){
  // 既存の皿を除去して作り直す(レベル拡張を見据えデータ駆動)
  var old = gameArea.querySelectorAll(".plate");
  old.forEach(function(p){ p.remove(); });

  state.round.targets.forEach(function(t){
    var plate = document.createElement("div");
    plate.className = "plate" + (t.trap ? " trap" : "");
    plate.dataset.corner = t.corner;
    plate.dataset.key = t.key;

    // 四隅の皿には料理画像を表示しない。画像は中央カードのみ表示する。
    var label = document.createElement("div");
    label.className = "plate-label";
    // 店長や対象外カード用に、右下の皿は「対象外」とする。
    label.textContent = t.trap ? OUT_OF_TARGET_LABEL : t.label;
    plate.appendChild(label);

    gameArea.appendChild(plate);
  });
}

function getPlateEl(corner){
  return gameArea.querySelector('.plate[data-corner="'+corner+'"]');
}

// カードのキーから「本物の部位/店長/対象外部位」を判定し、正解の皿(コーナー)を決める
// 今回の皿にない実在部位は、対象外の皿が正解
function resolveCardMeta(key){
  var target = state.round.targets.filter(function(t){ return t.key === key; })[0];
  if(target){
    return { key:key, label:target.label, correctLabel:(target.trap ? OUT_OF_TARGET_LABEL : target.label), correctCorner:target.corner, isBoss:!!target.trap, isDummy:false };
  }
  var trapTarget = state.round.targets.filter(function(t){ return t.trap; })[0];
  return { key:key, label:LABELS[key], correctLabel:OUT_OF_TARGET_LABEL, correctCorner:trapTarget.corner, isBoss:false, isDummy:true };
}

function pickNextKey(){
  var pool = state.round.weightedKeys;
  var key;
  var tries = 0;
  do{
    key = pool[Math.floor(Math.random()*pool.length)];
    tries++;
  } while(key === state.lastKey && key === state.lastKey2 && tries < 12);
  state.lastKey2 = state.lastKey;
  state.lastKey = key;
  return key;
}

function spawnCard(){
  state.locked = false;
  var key = pickNextKey();
  var card = resolveCardMeta(key);
  var asset = ASSETS[key] || { img:null };
  state.currentCard = card;

  meatCard.innerHTML = "";
  meatCard.classList.toggle("has-image", !!asset.img);
  meatCard.appendChild(buildVisual(key));

  // 画像がある部位はクイズ性を保つため、カード上に部位名を表示しない。
  // 店長など画像がないカードのみ、識別用の文字を表示する。
  if(!asset.img){
    var label = document.createElement("div");
    label.className = "card-label";
    label.textContent = card.label;
    meatCard.appendChild(label);
  }

  meatCard.style.transition = "none";
  meatCard.style.opacity = "1";
  meatCard.style.transform = "translate(0px,0px) rotate(0deg) scale(1)";
  void meatCard.offsetWidth;
}

function updateScoreDisplay(){
  hudScore.textContent = "SCORE " + state.score;
}

function showCorrectFeedback(){
  if(!correctOverlay) return;
  correctOverlay.classList.remove("active");
  void correctOverlay.offsetWidth;
  correctOverlay.classList.add("active");
}

function startGame(){
  state.level = LEVELS.filter(function(l){ return l.id === state.selectedLevelId; })[0] || LEVELS[0];
  state.round = buildRoundData(state.level);
  state.score = 0;
  state.lastKey = null;
  state.lastKey2 = null;
  state.locked = false;
  state.missCount = 0;
  state.humanMissCount = 0;
  state.missedKeys = [];
  updateScoreDisplay();
  gameoverOverlay.classList.remove("active");
  buildPlates();
  spawnCard();
  showScreen("game");

  state.gameStartTs = performance.now();
  hudTimer.classList.remove("low");
  tickTimer();
}

function tickTimer(){
  var elapsed = performance.now() - state.gameStartTs;
  var remain = state.level.timeMs - elapsed;
  if(remain <= 0){
    hudTimer.textContent = "0";
    endGame();
    return;
  }
  var sec = Math.ceil(remain/1000);
  hudTimer.textContent = sec;
  hudTimer.classList.toggle("low", remain <= 5000);
  state.timerRafId = requestAnimationFrame(tickTimer);
}
function stopTimer(){
  if(state.timerRafId){
    cancelAnimationFrame(state.timerRafId);
    state.timerRafId = null;
  }
}

function returnToStartFromGame(){
  stopTimer();
  state.dragging = false;
  state.locked = false;
  state.countingDown = false;
  hudTimer.classList.remove("low");
  gameArea.classList.remove("shake");
  gameoverOverlay.classList.remove("active");
  flashOverlay.classList.remove("active");
  if(correctOverlay) correctOverlay.classList.remove("active");
  showScreen("start");
}

/* ---------- ドラッグ／フリック処理 ---------- */
var MIN_DIST = 46;
var MIN_VELOCITY = 0.22; // px/ms
var BIG_DIST = 130;
var MAX_ROT = 18;

function pointFromEvent(e){
  if(e.touches && e.touches.length){
    return { x:e.touches[0].clientX, y:e.touches[0].clientY };
  }
  if(e.changedTouches && e.changedTouches.length){
    return { x:e.changedTouches[0].clientX, y:e.changedTouches[0].clientY };
  }
  return { x:e.clientX, y:e.clientY };
}

function onDragStart(e){
  if(state.locked) return;
  var p = pointFromEvent(e);
  state.dragging = true;
  state.startX = p.x; state.startY = p.y;
  state.curX = p.x; state.curY = p.y;
  state.dragStartTime = performance.now();
  meatCard.style.transition = "none";
}
function onDragMove(e){
  if(!state.dragging) return;
  if(e.cancelable) e.preventDefault();
  var p = pointFromEvent(e);
  state.curX = p.x; state.curY = p.y;
  var dx = state.curX - state.startX;
  var dy = state.curY - state.startY;
  var rot = Math.max(-MAX_ROT, Math.min(MAX_ROT, dx * 0.06));
  meatCard.style.transform = "translate("+dx+"px,"+dy+"px) rotate("+rot+"deg) scale(1)";
}
function onDragEnd(e){
  if(!state.dragging) return;
  state.dragging = false;
  var dx = state.curX - state.startX;
  var dy = state.curY - state.startY;
  var dist = Math.hypot(dx,dy);
  var duration = Math.max(1, performance.now() - state.dragStartTime);
  var velocity = dist / duration;

  var isFlick = dist >= BIG_DIST || (dist >= MIN_DIST && velocity >= MIN_VELOCITY);

  if(!isFlick){
    springBack();
    return;
  }
  var corner = detectCorner(dx,dy);
  resolveFlick(corner, dx, dy);
}
function detectCorner(dx,dy){
  if(dx < 0 && dy < 0) return "TL";
  if(dx >= 0 && dy < 0) return "TR";
  if(dx < 0 && dy >= 0) return "BL";
  return "BR";
}
function springBack(){
  meatCard.style.transition = "transform .28s cubic-bezier(.34,1.56,.64,1)";
  meatCard.style.transform = "translate(0px,0px) rotate(0deg) scale(1)";
}

function resolveFlick(corner, dx, dy){
  state.locked = true;
  var plateEl = getPlateEl(corner);
  var cardRect = meatCard.getBoundingClientRect();
  var plateRect = plateEl.getBoundingClientRect();
  var cardCX = cardRect.left + cardRect.width/2;
  var cardCY = cardRect.top + cardRect.height/2;
  var plateCX = plateRect.left + plateRect.width/2;
  var plateCY = plateRect.top + plateRect.height/2;
  var moveX = dx + (plateCX - cardCX);
  var moveY = dy + (plateCY - cardCY);
  var rot = Math.max(-MAX_ROT, Math.min(MAX_ROT, dx * 0.06));

  var finished = false;
  var fallbackId = null;

  function finish(){
    if(finished) return;
    finished = true;
    meatCard.removeEventListener("transitionend", onEnd);
    if(fallbackId) clearTimeout(fallbackId);
    handleResolution(corner, plateEl);
  }

  function onEnd(e){
    if(e.target !== meatCard) return;
    finish();
  }

  meatCard.addEventListener("transitionend", onEnd);
  fallbackId = setTimeout(finish, 350);

  meatCard.style.transition = "transform .22s ease-in";
  meatCard.style.transform = "translate("+moveX+"px,"+moveY+"px) rotate("+rot+"deg) scale(.3)";
}

function handleResolution(corner, plateEl){
  var correct = state.currentCard && corner === state.currentCard.correctCorner;

  if(correct){
    state.score++;
    updateScoreDisplay();
    showCorrectFeedback();
    beep(880,0.09,"triangle");
    vibrate(20);
    plateEl.classList.add("bounce");
    setTimeout(function(){ plateEl.classList.remove("bounce"); }, 420);
    spawnCard();
  } else {
    showMissFeedback(state.currentCard);
  }
}

function showMissFeedback(card){
  state.missCount++;
  if(card && card.key && LEARN_DATA[card.key]){
    state.missedKeys.push(card.key);
  }

  var kind = "normal";
  if(card && card.isBoss){
    kind = "boss";
    state.humanMissCount++;
  } else if(card && card.isDummy){
    kind = "dummy";
  }

  beep(140,0.35,"sawtooth");
  vibrate([100,50,100]);
  gameArea.classList.add("shake");
  flashOverlay.classList.remove("active"); void flashOverlay.offsetWidth; flashOverlay.classList.add("active");

  var bigEl = document.getElementById("gameover-big");
  var smallEl = document.getElementById("gameover-small");
  var answerEl = document.getElementById("gameover-answer");
  if(kind === "boss"){
    bigEl.textContent = "それ人間！！";
    smallEl.textContent = "店長は仕入れ先じゃありません";
  } else if(kind === "dummy"){
    bigEl.textContent = "今回は対象外！！";
    smallEl.textContent = "表示されている皿にない部位です";
  } else {
    bigEl.textContent = "ちがう皿！！";
    smallEl.textContent = "お皿を間違えました";
  }

  var correctPlateEl = null;
  if(card && card.correctCorner){
    var dir = CORNER_DIR_LABELS[card.correctCorner] || card.correctCorner;
    var cardName = card.label ? "これは『" + card.label + "』です。 " : "";
    answerEl.textContent = cardName + "正解は" + dir + "の『" + card.correctLabel + "』でした";
    correctPlateEl = getPlateEl(card.correctCorner);
    if(correctPlateEl) correctPlateEl.classList.add("hint");
  } else {
    answerEl.textContent = "";
  }

  gameoverOverlay.classList.add("active");

  setTimeout(function(){
    gameArea.classList.remove("shake");
    gameoverOverlay.classList.remove("active");
    if(correctPlateEl) correctPlateEl.classList.remove("hint");
    if(screens.game.classList.contains("active")){
      spawnCard();
    }
  }, 1100);
}

function endGame(){
  stopTimer();
  showResult();
}

/* ---------- ドラッグイベント登録(タッチ優先 + マウスはフォールバック) ---------- */
meatCard.addEventListener("touchstart", onDragStart, {passive:true});
meatCard.addEventListener("touchmove", onDragMove, {passive:false});
meatCard.addEventListener("touchend", onDragEnd, {passive:true});
meatCard.addEventListener("touchcancel", onDragEnd, {passive:true});

meatCard.addEventListener("mousedown", function(e){
  onDragStart(e);
  function mm(ev){ onDragMove(ev); }
  function mu(ev){
    onDragEnd(ev);
    window.removeEventListener("mousemove", mm);
    window.removeEventListener("mouseup", mu);
  }
  window.addEventListener("mousemove", mm);
  window.addEventListener("mouseup", mu);
});

gameArea.addEventListener("touchmove", function(e){
  if(state.dragging && e.cancelable) e.preventDefault();
}, {passive:false});

document.getElementById("btn-game-home").addEventListener("click", function(){
  returnToStartFromGame();
});

/* ---------------- 結果画面 ---------------- */
function getTaunt(){
  var score = state.score;
  if(state.humanMissCount > 0){
    return "店長を"+state.humanMissCount+"回も肉と間違えるとは…人間やめるレベルの珍プレー。";
  }
  if(state.missCount === 0 && score > 0){
    return "ノーミス"+score+"点！お見事、もう部位マスター名乗っていいレベル。";
  }
  if(score <= 0) return "開店休業レベル。まずは赤身から覚えよう。";
  if(score <= 4) return "バイト初日レベル。奥はまだ広いぞ。";
  if(score <= 9) return "見習い卒業目前！その調子。";
  if(score <= 14) return "なかなかやるな、常連の風格。";
  if(score <= 19) return "馬肉ソムリエ候補、店長も驚愕。";
  return "もはや店長超え！？伝説の仕分け人現る。";
}

function getRecommendedLearnKey(){
  if(state.missedKeys && state.missedKeys.length){
    for(var i = state.missedKeys.length - 1; i >= 0; i--){
      if(LEARN_DATA[state.missedKeys[i]]) return state.missedKeys[i];
    }
  }
  return "akami";
}

function showLearnDetail(key){
  var data = LEARN_DATA[key];
  if(!data) return;

  var img = document.getElementById("learn-image");
  var title = document.getElementById("learn-title");
  var trivia = document.getElementById("learn-trivia");
  var tip = document.getElementById("learn-tip");
  if(img) img.src = data.image;
  if(img) img.alt = data.label;
  if(title) title.textContent = data.label;
  if(trivia) trivia.textContent = data.trivia;
  if(tip) tip.textContent = "次回の見分け方: " + data.tip;

  document.querySelectorAll(".learn-chip").forEach(function(btn){
    btn.classList.toggle("active", btn.dataset.learnKey === key);
  });
  document.querySelectorAll(".learn-hotspot").forEach(function(btn){
    btn.classList.toggle("active", btn.dataset.learnKey === key);
  });
}

function setupLearningPanel(){
  var wrap = document.getElementById("learn-buttons");
  var lead = document.getElementById("learn-lead");
  if(!wrap) return;

  wrap.innerHTML = "";
  LEARN_ORDER.forEach(function(key){
    var data = LEARN_DATA[key];
    if(!data) return;
    var btn = document.createElement("button");
    btn.type = "button";
    btn.className = "learn-chip";
    btn.dataset.learnKey = key;
    btn.textContent = data.label;
    btn.addEventListener("click", function(){ showLearnDetail(key); });
    wrap.appendChild(btn);
  });

  document.querySelectorAll(".learn-hotspot").forEach(function(btn){
    btn.onclick = function(){ showLearnDetail(btn.dataset.learnKey); };
  });

  if(lead){
    if(state.missedKeys && state.missedKeys.length){
      lead.textContent = "今回まちがえた部位を優先表示しています。画像の部位、または下のボタンをタップして復習できます。";
    } else {
      lead.textContent = "画像の部位、または下のボタンをタップすると、写真と見分け方が表示されます。";
    }
  }

  showLearnDetail(getRecommendedLearnKey());
}

function showResult(){
  document.getElementById("result-score").textContent = state.score;
  document.getElementById("result-taunt").textContent = getTaunt();
  document.getElementById("result-miss").textContent = "ミス " + state.missCount + "回";
  document.getElementById("result-trivia").textContent = TRIVIA[Math.floor(Math.random()*TRIVIA.length)];
  setupLearningPanel();
  showScreen("result");
}

document.getElementById("btn-retry").addEventListener("click", function(){
  goCountdown();
});
document.getElementById("btn-result-home").addEventListener("click", function(){
  showScreen("start");
});

/* ---------------- 店員確認画面 ---------------- */
var STAFF_LIMIT_MS = 5*60*1000;
function stopStaffTimer(){
  if(state.staffIntervalId){
    clearInterval(state.staffIntervalId);
    state.staffIntervalId = null;
  }
}
function goStaffScreen(){
  document.getElementById("staff-score").textContent = state.score + "点";
  document.getElementById("staff-confirmed-badge").classList.remove("show");
  var confirmBtn = document.getElementById("btn-staff-confirm");
  confirmBtn.disabled = false;
  confirmBtn.textContent = "スタッフ確認ボタン";

  var endTime = Date.now() + STAFF_LIMIT_MS;
  var timerEl = document.getElementById("staff-timer");

  function update(){
    var remain = endTime - Date.now();
    if(remain <= 0){
      timerEl.textContent = "00:00";
      timerEl.style.color = "#666";
      stopStaffTimer();
      return;
    }
    var totalSec = Math.ceil(remain/1000);
    var m = Math.floor(totalSec/60);
    var s = totalSec % 60;
    timerEl.textContent = (m<10?"0":"")+m + ":" + (s<10?"0":"")+s;
  }
  stopStaffTimer();
  update();
  state.staffIntervalId = setInterval(update, 500);

  showScreen("staff");
}
document.getElementById("btn-staff").addEventListener("click", goStaffScreen);

document.getElementById("btn-staff-confirm").addEventListener("click", function(){
  beep(1046,0.15,"triangle");
  vibrate(30);
  document.getElementById("staff-confirmed-badge").classList.add("show");
  var btn = document.getElementById("btn-staff-confirm");
  btn.disabled = true;
  btn.textContent = "確認済みです";
  stopStaffTimer();
});
document.getElementById("btn-staff-home").addEventListener("click", function(){
  stopStaffTimer();
  showScreen("start");
});
